<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finishing Line</title>
<style>
  /* Simple Wood Goods brand: gold #e1b724, red #ee3e25, green #127d7f,
     white backgrounds. --warn is the gold darkened for small text on white. */
  :root { --bg:#ffffff; --panel:#faf9f5; --line:#e4e1d8; --text:#221f1a;
          --dim:#7a756a; --ok:#127d7f; --warn:#9c7f0e; --bad:#ee3e25; --accent:#e1b724; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text);
         font:14px/1.45 system-ui, sans-serif; padding:16px; max-width:1080px; margin:0 auto; }
  h1 { font-size:18px; letter-spacing:.04em; }
  header { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:14px; }
  .chip { padding:2px 10px; border-radius:99px; border:1px solid var(--line); color:var(--dim); }
  .chip.on { color:var(--ok); border-color:var(--ok); }
  button { background:var(--panel); color:var(--text); border:1px solid var(--line);
           border-radius:6px; padding:8px 16px; font:inherit; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.danger { color:var(--bad); }
  /* Header controls: solid brand colors. */
  #btn-run   { background:var(--ok);     border-color:var(--ok);     color:#fff; }
  #btn-pause { background:var(--accent); border-color:var(--accent); color:#221f1a; }
  #btn-halt  { background:var(--bad);    border-color:var(--bad);    color:#fff; font-weight:700; }
  #btn-run:hover, #btn-pause:hover, #btn-halt:hover { filter:brightness(1.08); }
  #btn-run.on { box-shadow:0 0 0 3px rgba(18,125,127,.3); }
  #banner { border-radius:8px; padding:10px 14px; margin-bottom:14px; display:none;
            border:1px solid var(--warn); color:var(--warn); }
  #banner.fault { border-color:var(--bad); color:var(--bad); display:block; }
  #banner.blocked { display:block; }
  .line { display:grid; gap:8px; margin-bottom:16px;
          grid-template-columns:1fr auto 1fr auto 1fr auto 1fr auto 1fr; }
  .arrow { align-self:center; color:var(--accent); font-weight:700; font-size:16px; }
  .station { background:var(--panel); border:1px solid var(--line); border-radius:10px;
             padding:10px; min-height:110px; }
  .station h3 { font-size:12px; color:var(--dim); letter-spacing:.08em; display:flex;
                justify-content:space-between; }
  .fan { font-size:11px; }
  .fan.on { color:var(--ok); }
  .part { margin-top:8px; background:var(--bg); border:1px solid var(--line);
          border-radius:8px; padding:6px 8px; font-size:13px; }
  .part .meta { color:var(--dim); font-size:11px; }
  .bar { height:5px; background:var(--line); border-radius:3px; margin-top:4px; overflow:hidden; }
  .bar i { display:block; height:100%; background:var(--accent); transition:width .3s; }
  .bar.done i { background:var(--ok); }
  .wet { color:var(--accent); }
  section { background:var(--panel); border:1px solid var(--line); border-radius:10px;
            padding:12px 14px; margin-bottom:12px; }
  section h2 { font-size:13px; color:var(--dim); letter-spacing:.06em; margin-bottom:8px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  select, input { background:var(--bg); color:var(--text); border:1px solid var(--line);
                  border-radius:6px; padding:7px 9px; font:inherit; }
  #ack-panel { display:none; }
  .unmeasured { color:var(--warn); font-size:12px; }
  footer { color:var(--dim); font-size:12px; margin-top:8px; }
  #io-toggle { cursor:pointer; user-select:none; }
  #io-strip { display:flex; gap:16px; flex-wrap:wrap;
              font:12px/1.6 ui-monospace, Consolas, monospace; color:var(--dim); }
  #io-table { border-collapse:collapse; font:12px/1.8 ui-monospace, Consolas, monospace; }
  .io-dir { display:inline-block; min-width:26px; text-align:center; margin-right:10px;
            border:1px solid var(--line); border-radius:4px; font-size:10px;
            color:var(--dim); letter-spacing:.05em; }
  #io-table td { padding:1px 18px 1px 0; }
  #io-table td.v { color:var(--dim); }
  .dot { display:inline-block; width:11px; height:11px; border-radius:50%;
         border:2px solid var(--ok); vertical-align:-1px; margin-right:7px; }
  .dot.hi { background:var(--ok); }
</style>
</head>
<body>
<header>
  <h1>FINISHING LINE</h1>
  <span id="beat" class="chip">–</span>
  <span id="phase" class="chip">–</span>
  <span id="shutter" class="chip">shutter –</span>
  <span id="feed" class="chip" style="display:none">feed –</span>
  <span style="flex:1"></span>
  <select id="product" title="intake product">
    <option value="cube">Cube</option>
    <option value="browser">Browser</option>
  </select>
  <button id="btn-run">Run</button>
  <button id="btn-pause">Pause</button>
  <button id="btn-halt" class="danger">HALT</button>
</header>

<div id="banner"></div>

<div class="line" id="stations"></div>

<section id="ack-panel">
  <h2>FAULT RECOVERY — confirm where each part actually is, then acknowledge</h2>
  <div class="row" id="ack-selects"></div>
  <div class="row" style="margin-top:8px">
    <button id="btn-ack">Acknowledge &amp; Resume</button>
    <span class="meta" id="ack-result"></span>
  </div>
</section>

<section id="io-panel" style="display:none">
  <h2 id="io-toggle"><span id="io-caret">&#9656;</span> I/O</h2>
  <div id="io-strip"></div>
  <table id="io-table" style="display:none"></table>
</section>

<footer>
  <span id="throughput"></span>
  <span id="unmeasured" class="unmeasured"></span>
</footer>

<script>
// Display order matches the physical line: parts flow RIGHT -> LEFT
// (IN on the right, OUT on the left).
const STATIONS = ["OUT","F2","O","F1","IN"];
// Operator-facing names; internal keys (occupancy, ack POSTs) are unchanged.
const LABELS = { IN: "In", F1: "Fan 1", O: "Robot", F2: "Fan 2", OUT: "Out" };
// I/O direction: eyes + belt status are read (in); coils are commanded (out).
const IO_DIR = { "MAIN BELT":"in", "INFEED BELT":"out", "WORK":"in",
                 "JUNCTION":"in", "STAGING":"in", "OFFLOAD":"in", "BRUSH":"out" };
const $ = id => document.getElementById(id);
let latest = null;

function partCard(id, p, target){
  const active = p.coats === 0 ? null : (p.coats === 1 ? p.flash_1_s : p.flash_2_s);
  const pct = active === null ? 0 : Math.min(100, 100*active/target);
  const done = active !== null && active >= target;
  return `<div class="part"><b>${id}</b> ${p.wet ? '<span class="wet">●wet</span>' : ''}
    <div class="meta">${p.product} · ${p.role} · coat ${p.coats}/2</div>
    ${p.coats>0 ? `<div class="bar ${done?'done':''}"><i style="width:${pct}%"></i></div>
    <div class="meta">flash ${active.toFixed(0)}s / ${target}s</div>` : ''}</div>`;
}

function render(s){
  latest = s;
  $("beat").textContent = s.beat;
  $("phase").textContent = s.phase;
  if (s.mode === "legacy") {
    $("shutter").style.display = "none";
    const feed = s.clearcore.feed;
    $("feed").style.display = feed ? "" : "none";
    $("feed").textContent = "feed: " + (feed ?? "?");
    $("feed").classList.toggle("on", feed === "hunting" || feed === "feeding");
  } else $("shutter").textContent = "shutter " + (s.clearcore.shutter ?? "?").toLowerCase();
  // Reflect the server's intake product unless the operator is mid-pick.
  const prod = $("product");
  if (s.intake_product && document.activeElement !== prod) prod.value = s.intake_product;
  $("btn-run").classList.toggle("on", s.enabled);

  const banner = $("banner");
  if (s.fault){ banner.className = "fault"; banner.textContent = "FAULT: " + s.fault; }
  else if (s.blocked_by){ banner.className = "blocked"; banner.textContent = "waiting: " + s.blocked_by; }
  else { banner.className = ""; banner.style.display = "none"; }
  if (s.fault || s.blocked_by) banner.style.display = "block";

  const target = s.config.flash_seconds;
  $("stations").innerHTML = STATIONS.map(st => {
    let inner = "";
    if (st === "IN") {
      const atJunction = s.clearcore.sensors?.IN
        ? `<div class="part"><b>next cube</b><div class="meta">waiting at junction</div></div>` : "";
      inner = atJunction
        + s.in_queue.map(id => `<div class="part"><b>${id}</b><div class="meta">queued</div></div>`).join("");
    }
    else if (st === "OUT")
      inner = s.clearcore.sensors?.OUT
        ? `<div class="part"><b>finished part</b><div class="meta wet">REMOVE PART</div></div>`
        : `<div class="meta" style="margin-top:8px">done parts exit here</div>`;
    else {
      const pid = s.occupancy[st];
      if (pid && s.parts[pid]) inner = partCard(pid, s.parts[pid], target);
    }
    const fan = (st==="F1"||st==="F2")
      ? `<span class="fan ${s.clearcore.fans?.[st] ? "on":""}">${s.clearcore.fans?.[st] ? "FAN ON":"fan off"}</span>` : "";
    const spray = (st==="O" && s.spraying) ? `<span class="fan on">SPRAYING</span>` : "";
    return `<div class="station"><h3>${LABELS[st] ?? st}${fan}${spray}</h3>${inner}</div>`;
  }).join(`<div class="arrow" aria-hidden="true">&#9664;</div>`);

  const ack = $("ack-panel");
  if (s.fault){
    ack.style.display = "block";
    if (!ack.dataset.built){
      const ids = ["", ...Object.keys(s.parts)];
      $("ack-selects").innerHTML = ["F2","O","F1"].map(st =>
        `<label>${LABELS[st] ?? st} <select data-st="${st}">${ids.map(i =>
          `<option ${s.occupancy[st]===i?"selected":""}>${i}</option>`).join("")}</select></label>`).join("");
      ack.dataset.built = "1";
    }
  } else { ack.style.display = "none"; delete ack.dataset.built; }

  const io = s.clearcore.io;
  $("io-panel").style.display = io ? "" : "none";
  if (io) {
    const rows = Object.entries(io).map(([k, v]) => {
      const hi = v === true || v === "hunting" || v === "feeding";
      const word = (typeof v === "string" && v !== "off") ? v : "";
      return {k, hi, word};
    });
    $("io-strip").innerHTML = rows.map(r =>
      `<span><span class="dot ${r.hi ? "hi" : ""}"></span>${r.k}</span>`).join("");
    $("io-table").innerHTML = rows.map(r =>
      `<tr><td>${r.k}</td><td><span class="io-dir">${IO_DIR[r.k] ?? "?"}</span></td>
       <td class="v"><span class="dot ${r.hi ? "hi" : ""}"></span>${r.word}</td></tr>`).join("");
  }

  $("throughput").textContent = `nominal ${(s.config.nominal_s_per_part/60).toFixed(1)} min/part · `;
  $("unmeasured").textContent = s.config.unmeasured.length
    ? `unmeasured: ${s.config.unmeasured.join(", ")}` : "";
}

async function post(url, body){
  const r = await fetch(url, {method:"POST", headers:{"Content-Type":"application/json"},
                              body: JSON.stringify(body||{})});
  if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
  return r.json();
}

$("btn-run").onclick   = () => post("/run", {enabled:true});
$("btn-pause").onclick = () => post("/run", {enabled:false});
$("btn-halt").onclick  = () => confirm("Halt the line?") && post("/halt", {reason:"operator halt (HMI)"});
$("product").onchange = async () => {
  try { await post("/product", {product: $("product").value}); }
  catch(e){
    if (latest?.intake_product) $("product").value = latest.intake_product;
    alert("set product failed: " + e.message);
  }
};
$("btn-ack").onclick = async () => {
  const occupancy = {};
  document.querySelectorAll("#ack-selects select").forEach(sel => {
    if (sel.value) occupancy[sel.dataset.st] = sel.value;
  });
  try {
    await post("/fault/ack", {occupancy});
    $("ack-result").textContent = "resumed";
  } catch(e){ $("ack-result").textContent = e.message; }
};

let ioOpen = false;
$("io-toggle").onclick = () => {
  ioOpen = !ioOpen;
  $("io-caret").innerHTML = ioOpen ? "&#9662;" : "&#9656;";
  $("io-table").style.display = ioOpen ? "" : "none";
  $("io-strip").style.display = ioOpen ? "none" : "";
};

function connect(){
  const ws = new WebSocket(`ws://${location.host}/events`);
  ws.onmessage = ev => render(JSON.parse(ev.data));
  ws.onclose = () => setTimeout(connect, 1000);
}
connect();
</script>
</body>
</html>
