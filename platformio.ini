; Finishing line — ClearCore firmware
;
; ClearCore is a Microchip SAME53N19A board from Teknic. There is no official
; PlatformIO board definition for it yet:
;   https://github.com/platformio/platform-atmelsam/issues/175
;   https://github.com/platformio/platform-atmelsam/pull/215   (approved, not merged)
;
; Until PR #215 merges into atmelsam, we point `platform` at the PR author's
; fork, pinned to the PR's head commit for reproducibility. The fork supplies
; both the `clearcore` board definition and the ClearCore Arduino wrapper as
; its `framework = arduino` implementation — no local boards/ dir or lib_deps
; needed. (Same pin as the 2604 Foot Leveler project.)
;
; When PR #215 merges upstream:
;   - change `platform` back to `atmelsam`
;   - delete this whole header

[platformio]
default_envs = clearcore
; Firmware lives under firmware/finishing_line/, not the default src/. Point
; PlatformIO there. (main.cpp is the setup()/loop() entry; the rest is .cpp/.h.)
src_dir = firmware/finishing_line

[env:clearcore]
platform  = https://github.com/patrickwasp/platform-atmelsam.git#c43ec8b722b56a5e27d2f058353aec74fb522f4c
board     = clearcore
framework = arduino

monitor_speed   = 115200
upload_protocol = sam-ba

; Stay on the ClearCore Arduino core's default C++ standard (gnu++11/14). C++17
; is broken here because the core's Common.h defines `min`/`max` as unconditional
; GNU statement-expression macros that mangle std::min/std::max once <cmath>
; pulls in <algorithm>. The firmware is already written C++11-clean.
build_flags =
    -Wall
    -Wextra
